spring.application.name=PortfolioDashboardBackend

# --- configure server port ---
server.port=${PORT:1907}

# --- configure my props ---
author.name=John

# Expose endpoints using a comma delimiter
#management.endpoints.web.exposure.include=health, info

# Expose all the endpoints using a wildcard
management.endpoints.web.exposure.include=*

# Add in info
management.info.env.enabled=true

info.app.name=Portfolio Dashboard Backend
info.app.author=Arthur
info.app.purpose=Reskilling and Upskilling

# Configure context path
server.servlet.context-path=/pdbapp

# --- MySQL connection (dynamic for local + production) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/portfolio_dashboard}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Give it 60 seconds to find the DB instead of 30
spring.datasource.hikari.connection-timeout=90000
# Don't kill the app if the DB isn't ready on second 1
spring.datasource.hikari.initialization-fail-timeout=0

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.main.lazy-initialization=true

# --- JPA / Hibernate settings ---
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.defer-datasource-initialization=true


